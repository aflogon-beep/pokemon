<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#0F172A"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="PokéBattle"/>
<meta name="description" content="PokéBattle — Combates Pokémon Generación 1"/>
<title>PokéBattle</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Roboto:wght@400;500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
<div id="app"></div>

<!-- Diagnostics — visible error display for mobile -->
<script>
window._diag = {errors:[], loaded:[]};
window.onerror = function(msg, src, line, col) {
  window._diag.errors.push((src||'').split('/').pop() + ':' + line + ' — ' + msg);
  showDiag();
  return false;
};
function showDiag() {
  const app = document.getElementById('app');
  if(!app) return;
  if(window._diag.errors.length === 0) return;
  app.style.cssText = 'position:fixed;inset:0;background:#050505;color:#fff;padding:16px;font-family:monospace;font-size:12px;overflow-y:auto;z-index:9999;';
  app.innerHTML =
    '<div style="color:#f87171;font-size:15px;margin-bottom:10px;font-weight:bold;">⚠ Error JavaScript</div>' +
    window._diag.errors.map(e =>
      '<div style="background:#1c0000;border-left:3px solid #ef4444;padding:8px 10px;margin-bottom:6px;border-radius:0 4px 4px 0;word-break:break-all;">' + e + '</div>'
    ).join('') +
    '<div style="color:#555;margin-top:12px;font-size:10px;">Loaded: ' + window._diag.loaded.join(', ') + '</div>';
}
</script>

<!-- 1. Audio (SFX, music, Web Audio API) -->
<script src="js/audio.js?v=018189" onload="window._diag.loaded.push('audio')" onerror="window._diag.errors.push('FAILED: audio.js');showDiag()"></script>

<!-- 2. Game data (Pokémon, moves, types, Pokédex) -->
<script src="js/data.js?v=018189" onload="window._diag.loaded.push('data')" onerror="window._diag.errors.push('FAILED: data.js');showDiag()"></script>

<!-- 2b. Battle quotes -->
<script src="js/quotes.js?v=018189"></script>

<!-- 3. Scenarios -->
<script src="js/scenarios/scenes.js?v=018189" onload="window._diag.loaded.push('scenes')" onerror="window._diag.errors.push('FAILED: scenes.js');showDiag()"></script>
<script src="js/scenarios/canvas-scenes.js?v=018189" onload="window._diag.loaded.push('canvas')" onerror="window._diag.errors.push('FAILED: canvas-scenes.js');showDiag()"></script>

<!-- 4. UI Screens -->
<script src="js/profiles.js?v=018189"></script>
    <script src="js/ui/screens.js?v=018189" onload="window._diag.loaded.push('screens')" onerror="window._diag.errors.push('FAILED: screens.js');showDiag()"></script>

<!-- 5. Battle engine -->
<script src="js/battle.js?v=018189" onload="window._diag.loaded.push('battle')" onerror="window._diag.errors.push('FAILED: battle.js');showDiag()"></script>

<!-- 6. Sprites & animations -->
<script src="js/sprites.js?v=018189" onload="window._diag.loaded.push('sprites')" onerror="window._diag.errors.push('FAILED: sprites.js');showDiag()"></script>

<!-- 7. Main (boots last) -->
<script src="js/main.js?v=018189" onload="window._diag.loaded.push('main')" onerror="window._diag.errors.push('FAILED: main.js');showDiag()"></script>

<!-- PWA Service Worker -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(r=>r.unregister())).then(()=>navigator.serviceWorker.register('sw.js?v=018189'))
      .then(()=>console.log('[SW] registered'))
      .catch(e=>console.log('[SW] error:',e));
  });
}
</script>
</body>
</html>
