<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Roboto',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;font-size:14px;}
html,body{height:100%;overflow:hidden;background:#000;}

   Nunito     → body, descriptions, labels, UI text (12-16px)
   Rajdhani   → section titles, trainer names, headers
   Impact     → combat labels, HP bars, K.O. (legacy, loud)

*/
#app{position:fixed;inset:0;overflow:hidden;}
/* SF-style HP bar */
.sf-hpbar-wrap{flex:1;height:22px;background:#1a0000;border:2px solid rgba(255,255,255,.2);border-radius:3px;overflow:hidden;position:relative;box-shadow:inset 0 2px 4px rgba(0,0,0,.5);}

.sf-name{font-family:'Rajdhani',Impact,sans-serif;font-size:min(1rem,2.8vw);letter-spacing:.08em;text-transform:uppercase;font-weight:700;}
/* Move buttons SF style */
.mv-btn{border:none;cursor:pointer;font-family:'Roboto',sans-serif;font-weight:900;text-align:left;color:#fff;position:relative;overflow:hidden;transition:filter .1s,transform .1s;border-radius:6px;}
.mv-btn:active{transform:scale(.93);filter:brightness(.8);}
.mv-btn[disabled]{opacity:.35;cursor:not-allowed;filter:saturate(.1);}

@keyframes shake{0%,100%{transform:translateX(0)}10%{transform:translateX(-16px)}25%{transform:translateX(16px)}40%{transform:translateX(-12px)}55%{transform:translateX(12px)}70%{transform:translateX(-6px)}85%{transform:translateX(6px)}}

<div id="app"></div>
<script>
// ========================================
// AUDIO (Web Audio API - better sounds)
// ========================================
let AC=null;
function getAC(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
function note(freq,dur,type,vol,atk,dec,vib=0){
  try{
    const ac=getAC();if(!ac)return;
    const g=ac.createGain(),o=ac.createOscillator();
    if(vib>0){const lfo=ac.createOscillator(),lg=ac.createGain();lfo.frequency.value=vib;lg.gain.value=10;lfo.connect(lg);lg.connect(o.frequency);lfo.start();}
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(0,ac.currentTime);
    g.gain.linearRampToValueAtTime(vol,ac.currentTime+atk);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+atk+dec+dur);
    o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+atk+dec+dur+.1);
  }catch(e){}
}
function sfxAtk(){if(!CFG.sfx)return;note(440,.05,"sawtooth",.2,.01,.15,5);setTimeout(()=>note(330,.08,"sawtooth",.15,.01,.2),60);}
function sfxHit(){if(!CFG.sfx)return;note(180,.05,"square",.3,.005,.2);note(90,.1,"triangle",.2,.005,.25);}
function sfxSuper(){if(!CFG.sfx)return;[523,659,784,1047].forEach((f,i)=>setTimeout(()=>note(f,.12,"square",.22,.01,.15),i*65));}
function sfxWeak(){if(!CFG.sfx)return;note(220,.15,"triangle",.12,.01,.3);}
function sfxFaint(){if(!CFG.sfx)return;[300,250,180,120,80].forEach((f,i)=>setTimeout(()=>note(f,.15,"sawtooth",.18,.01,.18),i*80));}
function sfxMenu(){if(!CFG.sfx)return;note(660,.03,"square",.1,.005,.06);}
function sfxSel(){if(!CFG.sfx)return;note(880,.04,"square",.12,.005,.05);setTimeout(()=>note(1100,.04,"square",.1,.005,.05),50);}
function sfxDefeat(){
  if(!CFG.sfx)return;
  const seq=[
    {f:392,t:0,d:.3,v:.2,tp:"sawtooth"},{f:349,t:350,d:.3,v:.18,tp:"sawtooth"},
    {f:330,t:700,d:.3,v:.18,tp:"sawtooth"},{f:294,t:1050,d:.6,v:.15,tp:"sawtooth"},
  ];
  seq.forEach(s=>setTimeout(()=>note(s.f,s.d,s.tp,s.v,.02,s.d*.9),s.t));
}
function sfxVic(){
  if(!CFG.sfx)return;
  // Dramatic victory fanfare — builds up then resolves
  const seq=[
    {f:523,t:0,d:.12,v:.25,tp:"square"},{f:523,t:130,d:.12,v:.25,tp:"square"},
    {f:523,t:260,d:.25,v:.3,tp:"square"},{f:415,t:390,d:.15,v:.2,tp:"square"},
    {f:523,t:520,d:.15,v:.25,tp:"square"},{f:659,t:700,d:.2,v:.3,tp:"square"},
    {f:784,t:900,d:.4,v:.3,tp:"square"},
    // Crash chord
    {f:523,t:1000,d:.5,v:.15,tp:"sawtooth"},{f:659,t:1000,d:.5,v:.15,tp:"sawtooth"},{f:784,t:1000,d:.5,v:.1,tp:"square"},
    // Resolution
    {f:1047,t:1400,d:.6,v:.25,tp:"square"},
  ];
  seq.forEach(s=>setTimeout(()=>note(s.f,s.d,s.tp,s.v,.01,s.d*.8),s.t));
  // Bass boom on KO
  setTimeout(()=>{note(80,.3,"sine",.4,.005,.4);note(120,.2,"sine",.3,.005,.3);},0);
}

// -- EPIC BATTLE MUSIC -----------------------------------------
// Settings: persist in localStorage
const CFG_KEY="pbCfg";
function loadCfg(){try{return JSON.parse(localStorage.getItem(CFG_KEY)||"{}");}catch(e){return{};}}
function saveCfg(k,v){const cfg=loadCfg();cfg[k]=v;try{localStorage.setItem(CFG_KEY,JSON.stringify(cfg));}catch(e){}}
let CFG={music:loadCfg().music!==false,sfx:loadCfg().sfx!==false};

let MUSIC={node:null,running:false,ac:null};
function startMusic(){
  if(!CFG.music||MUSIC.running)return;
  try{
    const ac=getAC();if(!ac)return;
    MUSIC.ac=ac;MUSIC.running=true;
    const master=ac.createGain();master.gain.value=0.18;master.connect(ac.destination);
    MUSIC.node=master;

    // Scenario-specific music parameters
    const scName=G.scenario?G.scenario.name:"estadio";
    const themes={
      campo:   {bpm:132,key:[0,2,4,7,9],mood:"bright"},
      estadio: {bpm:140,key:[0,3,5,7,10],mood:"epic"},
      futbol:  {bpm:148,key:[0,2,5,7,9],mood:"energetic"},
      galaxia: {bpm:120,key:[0,2,5,8,10],mood:"space"},
      cueva:   {bpm:108,key:[0,1,5,6,10],mood:"dark"},
      playa:   {bpm:128,key:[0,2,4,7,9],mood:"tropical"},
      noche:   {bpm:112,key:[0,2,5,7,9],mood:"mysterious"},
    };
    const theme=themes[scName]||themes.estadio;
    const BPM=theme.bpm,BEAT=60/BPM,BAR=BEAT*4;
    // Main melody notes (loop 8 bars)
    const melody=[
      [0,0.5,"E5"],[0.5,0.25,"D5"],[0.75,0.25,"C5"],
      [1,0.5,"E5"],[1.5,0.5,"G5"],
      [2,0.5,"A5"],[2.5,0.25,"G5"],[2.75,0.25,"F5"],
      [3,1,"E5"],
      [4,0.5,"C5"],[4.5,0.5,"E5"],
      [5,0.5,"G5"],[5.5,0.5,"A5"],
      [6,0.5,"B5"],[6.5,0.25,"A5"],[6.75,0.25,"G5"],
      [7,1,"E5"],
    ];
    // Bass line
    const bass=[
      [0,0.5,"E3"],[1,0.5,"A3"],[2,0.5,"F3"],[3,0.5,"G3"],
      [4,0.5,"C3"],[5,0.5,"E3"],[6,0.5,"G3"],[7,0.5,"E3"],
    ];
    // Percussion pattern (kick+snare)
    const perc=[
      {t:0,f:60,d:0.1,v:0.35,type:"sine"},  // kick
      {t:BEAT*2,f:200,d:0.05,v:0.2,type:"square"}, // snare
      {t:BEAT*4,f:60,d:0.1,v:0.35,type:"sine"},
      {t:BEAT*6,f:200,d:0.05,v:0.2,type:"square"},
    ];
    const NOTE_FREQ={
      "C3":130.8,"E3":164.8,"F3":174.6,"G3":196,"A3":220,"B3":246.9,
      "C4":261.6,"E4":329.6,"G4":392,"A4":440,
      "C5":523.3,"D5":587.3,"E5":659.3,"F5":698.5,"G5":784,"A5":880,"B5":987.8
    };
    const LOOP_LEN=BAR*8;
    let startT=ac.currentTime+0.1;
    function scheduleLoop(loopStart){
      if(!MUSIC.running)return;
      // Schedule melody
      melody.forEach(([beat,dur,note])=>{
        const t=loopStart+beat*BEAT;
        const g=ac.createGain(),o=ac.createOscillator();
        o.type="square";o.frequency.value=NOTE_FREQ[note]||440;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.3,t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,t+dur*BEAT*0.9);
        o.connect(g);g.connect(master);o.start(t);o.stop(t+dur*BEAT);
      });
      // Schedule bass
      bass.forEach(([beat,dur,note])=>{
        const t=loopStart+beat*BEAT;
        const g=ac.createGain(),o=ac.createOscillator();
        o.type="sawtooth";o.frequency.value=NOTE_FREQ[note]||110;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.25,t+0.01);
        g.gain.exponentialRampToValueAtTime(0.001,t+dur*BEAT*0.8);
        o.connect(g);g.connect(master);o.start(t);o.stop(t+dur*BEAT);
      });
      // Schedule percussion each bar
      for(let bar=0;bar<8;bar++){
        perc.forEach(({t,f,d,v,type})=>{
          const pt=loopStart+bar*BAR+t;
          const g=ac.createGain(),o=ac.createOscillator();
          o.type=type;o.frequency.value=f;
          g.gain.setValueAtTime(0,pt);g.gain.linearRampToValueAtTime(v,pt+0.005);
          g.gain.exponentialRampToValueAtTime(0.001,pt+d);
          o.connect(g);g.connect(master);o.start(pt);o.stop(pt+d+0.05);
        });
      }
      // Hi-hat 8th notes
      for(let i=0;i<32;i++){
        const pt=loopStart+i*(BEAT/2);
        const g=ac.createGain(),buf=ac.createBuffer(1,ac.sampleRate*0.04,ac.sampleRate);
        const data=buf.getChannelData(0);for(let j=0;j<data.length;j++)data[j]=(Math.random()*2-1)*0.3;
        const src=ac.createBufferSource();src.buffer=buf;
        g.gain.setValueAtTime(0.15,pt);g.gain.exponentialRampToValueAtTime(0.001,pt+0.04);
        src.connect(g);g.connect(master);src.start(pt);
      }
      // Schedule next loop
      if(MUSIC.running){
        const nextLoop=loopStart+LOOP_LEN;
        const delay=(nextLoop-ac.currentTime-0.1)*1000;
        setTimeout(()=>scheduleLoop(nextLoop),Math.max(0,delay));
      }
    }
    scheduleLoop(startT);
  }catch(e){console.log("Music error:",e);}
}
function stopMusic(){
  MUSIC.running=false;
  if(MUSIC.node){try{MUSIC.node.gain.linearRampToValueAtTime(0,MUSIC.ac.currentTime+0.5);}catch(e){}}
  MUSIC.node=null;
}
function toggleMusic(){
  CFG.music=!CFG.music;saveCfg("music",CFG.music);
  if(CFG.music&&G.scr==="battle")startMusic();
  else if(!CFG.music)stopMusic();
  render();
}
function toggleSfx(){
  CFG.sfx=!CFG.sfx;saveCfg("sfx",CFG.sfx);
  render();
}
function sfxSwitch(){note(330,.03,"square",.1,.005,.05);setTimeout(()=>note(500,.05,"square",.12,.005,.08),50);}

  },
  // 2. Galaxia / espacio
  {
    name:"galaxia",
    weather:"thunder",
    sky:`linear-gradient(180deg,#020618 0%,#0B1A3E 30%,#1a0a3e 60%,#2d1060 100%)`,
    clouds:false,
    stars:true,
    ground:`linear-gradient(180deg,#1a1040 0%,#0d0820 100%)`,
    groundH:40,
    nebula:true,
    groundDeco:`<g>
      <ellipse cx="50%" cy="82%" rx="40%" ry="8%" fill="rgba(100,0,200,.15)"/>
      <circle cx="20%" cy="75%" r="2%" fill="rgba(150,100,255,.3)"/>

    </g>`,
    p1ground:"75%",p2ground:"75%",

  },
  // 3. Estadio Pok-mon
  {
    name:"estadio",
    sky:`linear-gradient(180deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)`,
    clouds:false,

function extractColors(gradient){
  // Extract hex/rgb colors from a CSS gradient string
  const matches = gradient.match(/#[0-9a-fA-F]{3,6}|rgb\([^)]+\)/g);
  if(matches && matches.length>=2) return matches;
  // fallback: return two neutral colors
  return ["#1a1a2e","#16213e"];
}

      <rect x="0%" y="22%" width="100%" height="1.5%" fill="rgba(255,255,255,.2)"/>
    </g>`;
  }
  extras+=(sc.trees||"");
  extras+=(sc.groundDeco||"");
  return `<svg viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;">

  </svg>`;
}

function te(atk,dt){let m=1;for(const d of dt){const c=CH[atk]||{};if(c[d]!==undefined)m*=c[d];}return m;}
function dd(a,d,p,m){return Math.max(1,Math.floor(Math.floor(((20/5+2)*p*(a/d)/50)+2)*m));}
function hc(v){return v>.5?"#22C55E":v>.25?"#F59E0B":"#EF4444";}
function su(id){return"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/"+id+".png";}
function bdg(t){const c=TC[t]||TC.normal;return`<span class="bdg" style="background:${c.bg};color:${c.t};">${c.l}</span>`;}
function mkBar(cur,max,flip,id=""){
  const p=Math.max(0,cur/max)*100;
  const col=hc(cur/max);
  const idAttr=id?`id="${id}"`:"";
  return`<div class="sf-hpbar-wrap"><div ${idAttr} class="sf-hpbar-fill${flip?" r":""}" style="width:${p.toFixed(1)}%;background:${col};${flip?"right:0;left:auto;":""}box-shadow:0 0 8px ${col}88;transition:width .8s cubic-bezier(.4,0,.2,1),background .5s ease;"></div></div>`;
}
function animHpBar(id,cur,max,flip){
  const el=document.getElementById(id);
  if(!el)return;
  const p=Math.max(0,cur/max)*100;
  const pct=cur/max;
  const grad=pct>.5?(flip?"linear-gradient(270deg,#22C55E,#86efac,#22C55E)":"linear-gradient(90deg,#22C55E,#86efac,#22C55E)"):pct>.25?(flip?"linear-gradient(270deg,#EF4444,#f97316,#FCD34D)":"linear-gradient(90deg,#EF4444,#f97316,#FCD34D)"):(flip?"linear-gradient(270deg,#991B1B,#EF4444,#ff6b6b)":"linear-gradient(90deg,#991B1B,#EF4444,#ff6b6b)");
  el.style.width=p.toFixed(1)+"%";
  el.style.background=grad;
  el.style.boxShadow=`0 0 8px rgba(34,197,94,.5)`;
}
function statusBadge(st){if(!st)return"";const s=STATUS[st];return`<span style="display:inline-block;background:${s.bg};color:${s.color};border:1px solid ${s.color};border-radius:999px;font-size:.6rem;font-weight:800;padding:1px 6px;margin-left:4px;animation:statusBadge .4s ease;">${s.icon} ${s.label}</span>`;}
function applyStatusAnimation(spId, status){
  const sp=document.getElementById(spId);if(!sp)return;
  sp.style.animation="none";void sp.offsetWidth;
  const isP1=spId==="sp1";
  if(status==="poison")sp.style.animation="poisonPulse 1.5s ease-in-out infinite"+(isP1?", sleepFloat 2s ease-in-out infinite":"");
  else if(status==="burn")sp.style.animation="burnFlicker 1s ease-in-out infinite";
  else if(status==="paralysis")sp.style.animation="paralysePulse .8s ease-in-out infinite";
  else if(status==="sleep")sp.style.animation=(isP1?"sleepFloat 2s ease-in-out infinite":"sleepFloat2 2s ease-in-out infinite");
  else sp.style.animation="";
}
function spawnZzz(wrapId){
  const w=document.getElementById(wrapId);if(!w)return;

  z.style.cssText="position:absolute;top:10%;left:60%;font-size:1.2rem;pointer-events:none;animation:zzzFloat 1.5s ease-out forwards;z-index:50;";
  z.textContent="💤";w.appendChild(z);setTimeout(()=>z.remove(),1600);
}

function addRec(won,moves){
  const r=getRec();r.games++;r.totalMoves+=moves;
  if(won){r.wins++;r.streak++;r.bestStreak=Math.max(r.bestStreak,r.streak);}
  else{r.losses++;r.streak=0;}
  try{localStorage.setItem("pb_rec",JSON.stringify(r));}catch{}
}

  if(!G._enterShown){
      G._enterShown=true;

victory(){
  const{winner,loser,stats,isP1Win}=G.vd;
  const isWin=isP1Win!==false;
  const rec=getRec();

  // MVP: pokemon that dealt most (approx by type usage)
  const topType=stats.dmgTypes?Object.entries(stats.dmgTypes).sort((a,b)=>b[1]-a[1])[0]:null;
  const mvpPk=G.p1&&G.p1.team?G.p1.team.reduce((b,p)=>p.currentHp>b.currentHp?p:b,G.p1.team[0]):null;

  // Confetti (win) or rain (lose)
  let fx="";
  if(isWin){
    for(let i=0;i<60;i++){
      const x=Math.random()*100,dl=Math.random()*2.5;
      const col=["#F59E0B","#22C55E","#3B82F6","#A855F7","#fff"][i%5];
      const s=6+Math.random()*10;
      fx+=`<div style="position:absolute;left:${x}%;top:-10px;width:${s}px;height:${s*.5}px;background:${col};border-radius:2px;animation:conffall ${2+dl}s linear ${dl}s infinite;"></div>`;
    }
  } else {
    for(let i=0;i<40;i++){
      const x=Math.random()*100,dl=Math.random()*3;
      fx+=`<div style="position:absolute;left:${x}%;top:-10px;width:2px;height:${12+Math.random()*16}px;background:rgba(150,180,255,.35);border-radius:1px;animation:conffall ${1.5+Math.random()*2}s linear ${dl}s infinite;"></div>`;
    }
  }

  const bg=isWin
    ?'radial-gradient(ellipse at center,#0a2010 0%,#0F172A 60%,#1E3A5F 100%)'
    :'radial-gradient(ellipse at center,#0a0a1a 0%,#050510 60%,#0a0a20 100%)';

  const statsCards=`
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;">
      <div style="background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:10px 6px;text-align:center;">
        <div style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.6rem;color:#F59E0B;">${stats.moves}</div>
        <div style="font-family:'Roboto',sans-serif;font-size:.6rem;color:#888;font-weight:700;letter-spacing:.04em;">TURNOS</div>
      </div>
      <div style="background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:10px 6px;text-align:center;">
        <div style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.6rem;color:#EF4444;">${stats.defeated||0}</div>
        <div style="font-family:'Roboto',sans-serif;font-size:.6rem;color:#888;font-weight:700;letter-spacing:.04em;">DERROTADOS</div>
      </div>
      <div style="background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:10px 6px;text-align:center;">
        <div style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.6rem;color:#22C55E;">${stats.dmgDone||0}</div>
        <div style="font-family:'Roboto',sans-serif;font-size:.6rem;color:#888;font-weight:700;letter-spacing:.04em;">DAÑO TOTAL</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;">
      ${topType?`<div style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.15);border-radius:8px;padding:8px 10px;text-align:center;"><div style="font-size:.75rem;color:#60A5FA;font-weight:700;margin-bottom:2px;">TIPO FAVORITO</div><div>${bdg(topType[0])}</div></div>`:''}
      ${mvpPk?`<div style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.15);border-radius:8px;padding:8px 10px;text-align:center;"><div style="font-size:.75rem;color:#60A5FA;font-weight:700;margin-bottom:2px;">SOBREVIVIENTE</div><div style="font-family:'Roboto',sans-serif;font-size:.8rem;font-weight:700;color:#fff;">${mvpPk.name}</div></div>`:''}
    </div>
    <div style="text-align:center;margin-bottom:14px;font-family:'Roboto',sans-serif;font-size:.72rem;color:rgba(255,255,255,.35);">
      🏆 ${rec.wins}V · 💀 ${rec.losses}D · ⚡ Racha: ${rec.streak} · 🔥 Mejor: ${rec.bestStreak}
    </div>`;

  return`<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:${bg};overflow:hidden;">
    ${fx}
    <div style="position:relative;z-index:1;text-align:center;padding:16px;width:min(340px,95vw);overflow-y:auto;max-height:100%;">
      <div style="font-family:'Press Start 2P',monospace;font-size:min(2rem,7vw);color:${isWin?'#F59E0B':'#6B7280'};text-shadow:0 0 40px ${isWin?'rgba(245,158,11,.8)':'rgba(100,100,150,.5)'},0 4px 0 ${isWin?'#7c3e00':'#333'};letter-spacing:.08em;line-height:1.2;animation:vsSlam .6s cubic-bezier(.175,.885,.32,1.275) both;">${isWin?'K.O.!':'DERROTA'}</div>
      <div style="font-family:'Rajdhani',sans-serif;font-size:min(1.6rem,5.5vw);color:${isWin?'#fff':'#94A3B8'};font-weight:700;letter-spacing:.1em;margin:8px 0 16px;">${A[winner.avatar]} ${winner.name.toUpperCase()} ${isWin?'WINS!':'GANA'}</div>
      ${statsCards}
      <div style="display:flex;flex-direction:column;gap:8px;width:100%;">
        <button class="btn" style="background:linear-gradient(135deg,#3B82F6,#1D4ED8);font-family:'Roboto',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.04em;border-radius:6px;" onclick="sfxMenu();doRm()">⟳ REVANCHA</button>

        <button class="btn" style="background:rgba(15,23,42,.9);border:1px solid rgba(59,130,246,.2);font-family:'Roboto',sans-serif;font-weight:700;font-size:.9rem;letter-spacing:.04em;border-radius:6px;color:rgba(255,255,255,.4);" onclick="sfxMenu();go('title')">← INICIO</button>
      </div>
    </div>
  </div>`;

function sMode(m){G.mode=m;G.cstep=1;G.p1=null;G.p2=null;go("create");}
function sAv(i){
  const inp=document.getElementById("cname");

function bkCreate(){G.cstep=1;render();}
function cNext(){

  let nm=inp?inp.value.trim():"";
  if(!nm){
    // Shake the input to signal it's required
    if(inp){inp.style.border="2px solid #EF4444";inp.style.animation="shake .4s";inp.focus();setTimeout(()=>{inp.style.border="2px solid #E2E8F0";inp.style.animation="";},500);}
    return;

  else{G.p2={name:nm,avatar:G.av2};G.sel=[];G.sfor=1;go("select");}

function tPk(id){const pk=PKS.find(p=>p.id===id);G.pvpk=pk;const i=G.sel.findIndex(s=>s.id===id);if(i>=0)G.sel.splice(i,1);else if(G.sel.length<3)G.sel.push(pk);render();}
function dePk(id){sfxSel();const i=G.sel.findIndex(s=>s.id===id);if(i>=0){G.sel.splice(i,1);if(G.pvpk&&G.pvpk.id===id)G.pvpk=null;}render();}
function modalAct(id){
  const iS=!!G.sel.find(s=>s.id===id);
  if(iS){dePk(id);G.modal=null;render();return;}
  if(G.sel.length<3){sfxSel();const pk=PKS.find(p=>p.id===id);if(pk)G.sel.push(pk);G.modal=null;render();}
}
function cSel(){
  if(G.sel.length<3)return;
  const team=G.sel.map(pk=>({...pk,currentHp:pk.hp,ppLeft:pk.moves.map(m=>m.pp)}));
  if(G.sfor===1){
    G.p1.team=team;
    if(G.mode==="cpu"){
      const u=team.map(p=>p.id);
      // CPU picks a themed team based on difficulty
      const affinities={
        fire:[6,59,126,146,78,5,136,38,77],    // Charizard,Arcanine,Magmar,Moltres...
        water:[9,130,131,121,55,73,87,62,99],   // Blastoise,Gyarados,Lapras...
        psychic:[150,65,97,121,124,80,103,49],  // Mewtwo,Alakazam,Hypno...
        ghost:[94,93,92],                        // Gengar,Haunter,Gastly
        dragon:[149,148,147],                    // Dragonite,Dragonair,Dratini
        fighting:[68,57,107,106,62],             // Machamp,Primeape...
        random:null
      };
      const affinityKeys=Object.keys(affinities);
      const chosenAff=G.diff==="hard"
        ? affinityKeys[Math.floor(Math.random()*(affinityKeys.length-1))] // hard: themed
        : "random";
      let cpuPool;
      if(chosenAff==="random"||!affinities[chosenAff]){
        cpuPool=PKS.filter(p=>!u.includes(p.id)).sort(()=>Math.random()-.5).slice(0,3);
      } else {
        const ids=affinities[chosenAff];
        const themed=ids.map(id=>PKS.find(p=>p.id===id)).filter(Boolean).filter(p=>!u.includes(p.id));
        cpuPool=themed.slice(0,3);
        // Fill with random if not enough
        if(cpuPool.length<3){
          const extra=PKS.filter(p=>!u.includes(p.id)&&!cpuPool.find(x=>x.id===p.id)).sort(()=>Math.random()-.5);
          cpuPool=[...cpuPool,...extra].slice(0,3);
        }
      }
      const av=cpuPool;
      G.p2.team=av.map(pk=>({...pk,currentHp:pk.hp,ppLeft:pk.moves.map(m=>m.pp)}));
      go("scenepick");
    } else {
      G.sel=[];G.sfor=2;G.pvpk=null;go("select");
    }
  } else {
    G.p2.team=team;
    go("scenepick");
  }
}
function pickScene(idx){
  if(idx===-1) G.scenario=SCENARIOS[Math.floor(Math.random()*SCENARIOS.length)];

}

function usePotion(){
  const b=G.bat;

  const pk=b.t1[b.a1];
  if(pk.currentHp>=pk.hp){amsg('<span style="color:#FDA4AF;font-weight:700;">💊 HP ya al máximo</span>',1400);return;}
  b.potions1=0;
  const heal=Math.min(30,pk.hp-pk.currentHp);

  blogPush(`<span style="color:#4ade80;font-weight:700;">💊 ${pk.name} recupera ${heal} HP</span>`);

  sfxMenu();
  // CPU also acts
  if(G.mode==="cpu"){
    b.locked=true;render();
    setTimeout(()=>{
      const ca=cpuA();
      if(ca.type==="potion"&&b.potions2>0){
        const cp=b.t2[b.a2];
        const ch=Math.min(30,cp.hp-cp.currentHp);

}

function sfxBurst(isSuper,color){
  // Central screen flash + burst
  const arena=document.getElementById("arena");
  if(!arena)return;
  // Screen flash
  const flash=document.createElement("div");
  flash.style.cssText=`position:absolute;inset:0;background:${isSuper?"rgba(255,240,80,.45)":"rgba(255,255,255,.25)"};z-index:10;pointer-events:none;animation:sfShock ${isSuper?".45s":".3s"} ease-out forwards;`;
  arena.appendChild(flash);setTimeout(()=>flash.remove(),800);
  // Screen shake for super effective
  if(isSuper){
    arena.style.animation="none";void arena.offsetWidth;
    arena.style.transform="translate(0,0)";
    let s=0;const shk=setInterval(()=>{
      s++;arena.style.transform=`translate(${(Math.random()-.5)*12}px,${(Math.random()-.5)*6}px)`;
      if(s>6){clearInterval(shk);arena.style.transform="";};
    },50);
  }

  // Central burst rings
  const cx=document.getElementById("sfx-center");if(!cx)return;
  const rings=isSuper?3:2;
  for(let i=0;i<rings;i++){
    setTimeout(()=>{
      const ring=document.createElement("div");
      ring.style.cssText=`position:absolute;width:${isSuper?120:80}px;height:${isSuper?120:80}px;border-radius:50%;border:${isSuper?5:3}px solid ${color};animation:sfBurst ${isSuper?.5:.35}s ease-out forwards;`;
      cx.appendChild(ring);setTimeout(()=>ring.remove(),600);
      // Star burst for super
      if(isSuper){
        const star=document.createElement("div");
        star.style.cssText=`position:absolute;width:0;height:0;border-left:40px solid transparent;border-right:40px solid transparent;border-bottom:70px solid ${color};opacity:.8;animation:sfStar .5s ease-out forwards;filter:drop-shadow(0 0 8px ${color});`;
        cx.appendChild(star);setTimeout(()=>star.remove(),600);
      }
    },i*80);
  }
  // Slash lines
  const numSlash=isSuper?5:3;
  for(let i=0;i<numSlash;i++){
    setTimeout(()=>{
      const slash=document.createElement("div");
      const angle=(Math.random()*180-90).toFixed(0);
      const w=isSuper?(60+Math.random()*80):(30+Math.random()*50);
      slash.style.cssText=`position:absolute;width:${w}px;height:${isSuper?4:2}px;background:linear-gradient(90deg,transparent,${color},white,transparent);transform-origin:left center;transform:rotate(${angle}deg);animation:sfSlash .35s ease-out forwards;filter:blur(.5px);box-shadow:0 0 8px ${color};`;
      cx.appendChild(slash);setTimeout(()=>slash.remove(),400);
    },i*40);
  }
  // Particle sparks
  const sparks=isSuper?12:7;
  for(let i=0;i<sparks;i++){
    setTimeout(()=>{
      const spark=document.createElement("div");
      const angle=Math.random()*360;const dist=(30+Math.random()*60);
      const dx=Math.cos(angle*Math.PI/180)*dist;
      const dy=Math.sin(angle*Math.PI/180)*dist;
      spark.style.cssText=`position:absolute;width:${isSuper?8:5}px;height:${isSuper?8:5}px;background:${Math.random()>.5?color:"#fff"};border-radius:50%;animation:dmgFloat .7s ease-out forwards;box-shadow:0 0 6px ${color};`;
      spark.style.setProperty("--dx",dx+"px");spark.style.setProperty("--dy",dy+"px");
      // Manual movement
      cx.appendChild(spark);
      const start=Date.now();
      const move=()=>{const t=(Date.now()-start)/700;if(t>=1){spark.remove();return;}spark.style.transform=`translate(${dx*t}px,${dy*t-30*t*t}px)`;spark.style.opacity=1-t;requestAnimationFrame(move);};
      move();
    },i*25);
  }
}

function jsLunge(el,isP1,onImpact){
  const wrapEl=document.getElementById(isP1?"sp1wrap":"sp2wrap");
  if(!wrapEl)return;
  const arena=document.getElementById("arena");
  const W=arena?arena.offsetWidth:SP.W||800;
  const dist=Math.round(W*0.18);
  // P1 faces right (scaleX-1), lunges toward p2 = move right = left increases
  // P2 faces left, lunges toward p1 = move left = right decreases (or left set)
  const offsets=[0, dist*0.2*(isP1?1:-1), dist*(isP1?1:-1), dist*0.3*(isP1?1:-1), 0];
  const times=[0,200,160,120,280];
  let step=0;
  const origLeft=wrapEl.style.left;
  const origRight=wrapEl.style.right;
  const origLeftPx=parseInt(origLeft)||0;
  const origRightPx=parseInt(origRight)||0;
  function next(){
    if(step>=offsets.length){
      wrapEl.style.transition="";
      if(isP1)wrapEl.style.left=origLeft;
      else wrapEl.style.right=origRight;
      return;
    }
    const spd=step===0?0.01:step===2?0.13:0.22;
    if(isP1){
      wrapEl.style.transition=`left ${spd}s ease`;
      wrapEl.style.left=(origLeftPx+offsets[step])+"px";
    } else {
      wrapEl.style.transition=`right ${spd}s ease`;
      wrapEl.style.right=(origRightPx-offsets[step])+"px";
    }
    if(step===2&&onImpact)onImpact();
    setTimeout(next,times[step]);
    step++;
  }
  next();
}

function hitAnim(spId,wrapId,ripId,color,dmg,isS){
  const defender=document.getElementById(spId);
  const isDefP1=(spId==="sp1");
  const atkId=isDefP1?"sp2":"sp1";
  const atkWrapId=isDefP1?"sp2wrap":"sp1wrap";
  const isAtkP1=!isDefP1;
  // Attacker lunges JS-driven
  const atkWrap=document.getElementById(atkWrapId);
  jsLunge(atkWrap,isAtkP1,()=>{
    // On impact: defender shakes + effects
    if(defender){
      defender.style.animation="none";void defender.offsetWidth;
      defender.style.animation="shake .7s, flashW .6s, "+(isDefP1?"sfRecoil":"sfRecoil2")+" .65s";
      setTimeout(()=>{if(defender){defender.style.animation="";}},900);
    }
    sfxBurst(isS,color);
    spawnDmg(wrapId,dmg,color,isS);
  });
}

// -- CPU AI -----------------------------------------------------
function cpuA(){
  const b=G.bat,cpu=b.t2[b.a2],en=b.t1[b.a1];
  const avail=cpu.moves.map((m,i)=>({m,i})).filter(x=>b.cd2[x.i]===0);
  if(!avail.length)return{type:"attack",moveIdx:0};

  // FÁCIL: random move, never switches
  if(G.diff==="easy"){
    return{type:"attack",moveIdx:avail[Math.floor(Math.random()*avail.length)].i};
  }

  // NORMAL: picks best move
  let bi=avail[0].i,bs=-1;
  avail.forEach(({m,i})=>{const sc=m.p*te(m.t,en.types);if(sc>bs){bs=sc;bi=i;}});
  if(G.diff==="normal"){return{type:"attack",moveIdx:bi};}

  // DIFÍCIL: best move + smart switching + predicts player
  // Switch if current pokemon is at type disadvantage vs player
  const defMult=te(en.types[0],cpu.types);
  if(defMult>=2){
    // Find best replacement
    const best=b.t2.reduce((bst,pk,i)=>{
      if(pk.currentHp<=0||i===b.a2)return bst;
      const score=pk.currentHp/pk.hp*100 + te(en.types[0],pk.types)*(-20) + te(pk.types[0],en.types)*20;
      return score>bst.score?{i,score}:bst;
    },{i:-1,score:-99});
    if(best.i!==-1&&Math.random()<.7)return{type:"switch",to:best.i};
  }
  // Use potion if low HP (difícil CPU is smarter)
  if(cpu.currentHp/cpu.hp<0.3&&b.potions2>0){return{type:"potion"};}
  return{type:"attack",moveIdx:bi};
}
function reduceCd(arr){return arr.map(v=>Math.max(0,v-1));}

function doAtk(i){
  const b=G.bat;if(b.cd1[i]>0&&b.ct==="p1")return;if(b.cd2[i]>0&&b.ct==="p2")return;
  b.ph="action";const ac={type:"attack",moveIdx:i};
  if(G.mode==="cpu"){execAnim(ac,cpuA());}
  else if(b.ct==="p1"){G.pact=ac;b.ct="p2";shPass(G.p2,()=>{b.ph="action";go("battle");});}
  else{execAnim(G.pact,ac);G.pact=null;b.ct="p1";}
}
function doSw(i){
  const b=G.bat;b.ph="action";const ac={type:"switch",to:i};
  if(G.mode==="cpu"){execAnim(ac,cpuA());}
  else if(b.ct==="p1"){G.pact=ac;b.ct="p2";shPass(G.p2,()=>{b.ph="action";go("battle");});}
  else{execAnim(G.pact,ac);G.pact=null;b.ct="p1";}
}

// -- Main turn animator -----------------------------------------
function execAnim(a1,a2){
  const b=G.bat;b.locked=true;render();
  const sc=G.scenario;
  const nt1=b.t1.map(p=>({...p})),nt2=b.t2.map(p=>({...p}));
  let na1=b.a1,na2=b.a2;const st={...b.st};
  const p1f=nt1[b.a1].spd>=nt2[b.a2].spd;
  const evs=[];

  const weather=sc?sc.weather:null;
  function resolveAct(atk,def,ac,nm,ip){
    if(ac.type==="switch"){
      const idx=ac.to;evs.push({type:"sw",nm,toName:(ip?nt1:nt2)[idx].name,ip,idx});
      if(ip)na1=idx;else na2=idx;return;
    }
    // Check if paralyzed (25% chance to skip)
    if(atk.status==="paralysis"&&Math.random()<.25){
      evs.push({type:"status_skip",nm,reason:"paralysis",ip});return;
    }
    // Check if asleep
    if(atk.status==="sleep"){
      atk.statusTurns=(atk.statusTurns||0)+1;
      if(atk.statusTurns<3){evs.push({type:"status_skip",nm,reason:"sleep",ip});return;}
      else{atk.status=null;atk.statusTurns=0;evs.push({type:"status_wake",nm,ip});}
    }
    const mv=atk.moves[ac.moveIdx];if(!mv)return;
    // Handle status/buff moves (p===0 with effect)
    if(mv.p===0&&mv.effect){
      if(atk.ppLeft[ac.moveIdx]>0)atk.ppLeft[ac.moveIdx]--;
      if(mv.effect==="heal"){
        const h=Math.round(atk.hp*0.5);atk.currentHp=Math.min(atk.hp,atk.currentHp+h);
        atk.status=null;
        evs.push({type:"status_effect",nm,eff:"heal",val:h,ip});
      } else if(mv.effect==="atkup"){
        atk._atkBoost=(atk._atkBoost||0)+1;
        evs.push({type:"status_effect",nm,eff:"atkup",ip});
      } else if(mv.effect==="defup"){
        atk._defBoost=(atk._defBoost||0)+1;
        evs.push({type:"status_effect",nm,eff:"defup",ip});
      } else if(mv.effect==="sleep_opp"){
        if(!def.status){def.status="sleep";def.statusTurns=0;}
        evs.push({type:"status_effect",nm,eff:"sleep_opp",defNm:def.name,ip});
      }
      return;
    }
    const mult=te(mv.t,def.types);
    const atkStat=Math.round(atk.atk*(1+(atk._atkBoost||0)*0.5));
    const defStat=Math.round(def.def*(1+(def._defBoost||0)*0.5));
    let d=dd(atkStat,defStat,mv.p,mult);
    // Weather modifiers
    if(weather==="rain"){
      if(mv.t==="water")d=Math.round(d*1.3);
      if(mv.t==="fire")d=Math.round(d*0.7);
    } else if(weather==="thunder"&&Math.random()<0.15&&!def.status){
      def.status="paralysis"; // thunder storms can paralyze
    } else if(weather==="fog"&&Math.random()<0.25){
      d=Math.round(d*0.8); // fog reduces accuracy/damage
    }
    // Burn reduces attack damage by 50%
    if(atk.status==="burn")d=Math.max(1,Math.floor(d*.5));
    def.currentHp=Math.max(0,def.currentHp-d);
    if(atk.ppLeft[ac.moveIdx]>0)atk.ppLeft[ac.moveIdx]--;
    if(ip)b.cd1[ac.moveIdx]=2;else b.cd2[ac.moveIdx]=2;
    st.moves++;
    const isS=mult>=2,isW=mult>0&&mult<=.5,isN=mult===0;
    // Status application (15% chance per move type)
    let newStatus=null;
    if(mult>0&&!def.status){
      for(const[st_id,moves_list] of Object.entries(STATUS_MOVES)){
        if(moves_list.includes(mv.n)&&Math.random()<.3){newStatus=st_id;break;}
      }
    }
    if(newStatus)def.status=newStatus;
    st.dmgDone=(st.dmgDone||0)+d;
    if(ip){st.dmgTypes=st.dmgTypes||{};st.dmgTypes[mv.t]=(st.dmgTypes[mv.t]||0)+1;}
    evs.push({type:"atk",nm,mv,ip,d,isS,isW,isN,col:(TC[mv.t]||TC.fire).bg,fainted:def.currentHp<=0,defNm:def.name,newStatus});
    if(def.currentHp<=0)st.defeated++;
    // End-of-turn status damage
    if(atk.status==="poison"||atk.status==="burn"){
      const dot=Math.max(1,Math.floor(atk.hp/8));
      atk.currentHp=Math.max(0,atk.currentHp-dot);
      evs.push({type:"status_dmg",nm,status:atk.status,dot,ip,fainted:atk.currentHp<=0});
      if(atk.currentHp<=0)st.defeated++;
    }
  }

  if(p1f){resolveAct(nt1[b.a1],nt2[b.a2],a1,G.p1.name,true);if(nt2[na2].currentHp>0)resolveAct(nt2[b.a2],nt1[na1],a2,G.p2.name,false);}
  else{resolveAct(nt2[b.a2],nt1[b.a1],a2,G.p2.name,false);if(nt1[na1].currentHp>0)resolveAct(nt1[b.a1],nt2[na2],a1,G.p1.name,true);}

  let delay=0;
  evs.forEach(ev=>{
    setTimeout(()=>{
      if(G.scr!=="battle")return;
      if(ev.type==="status_effect"){
        const effMsgs={
          heal:`<span style="color:#4ade80;font-weight:900;">💚 ${ev.nm} recupera HP!</span>`,
          atkup:`<span style="color:#FCD34D;font-weight:900;">⬆ ${ev.nm}: ¡Ataque subió!</span>`,
          defup:`<span style="color:#60A5FA;font-weight:900;">🛡 ${ev.nm}: ¡Defensa subió!</span>`,
          sleep_opp:`<span style="color:#818CF8;font-weight:900;">💤 ¡${ev.defNm} se ha dormido!</span>`,
        };
        amsg(effMsgs[ev.eff]||"",1600);
      } else if(ev.type==="sw"){
        sfxSwitch();
        // Pokéball animation before showing new pokemon
        const swIsP1=ev.ip;
        const swWrapId=swIsP1?"sp1wrap":"sp2wrap";
        const swEl=document.getElementById(swIsP1?"sp1":"sp2");
        if(swEl)swEl.style.opacity="0";
        animPokeball(swIsP1,()=>{if(swEl)swEl.style.opacity="1";});
        amsg(`<span style="color:#fff;font-weight:900;font-size:1.05rem;">🔄 ${ev.nm} cambia a <span style="color:#FCD34D;font-size:1.2rem;">${ev.toName}</span>!</span>`,1600);
      } else {
        // "X us- Y!"
        sfxAtk();
        // Show attacker quote if available
        const atkQ=qGet(ev.ip?b.t1[b.a1].id:b.t2[b.a2].id,"atk");
        if(atkQ){
          // Quote over attacker's head
          const atkIsP1=ev.ip;
          if(Math.random()<0.33) amsgPoke(atkIsP1,`<span style="color:#FCD34D;font-weight:900;font-size:1.05rem;font-style:italic;">"${atkQ}"</span>`,1800);
          setTimeout(()=>amsg(`<span style="color:#fff;font-weight:900;font-size:1rem;">${ev.nm} usó <span style="color:${ev.col};font-size:1.2rem;text-shadow:0 0 10px ${ev.col};">${ev.mv&&ev.mv.n?ev.mv.n:"???"}!</span></span>`,1600),1900);
        } else {
          amsg(`<span style="color:#fff;font-weight:900;font-size:1rem;">${ev.nm} usó <span style="color:${ev.col};font-size:1.25rem;text-shadow:0 0 10px ${ev.col};">${ev.mv&&ev.mv.n?ev.mv.n:"???"}!</span></span>`,1800);
        }
        // Hit after 1800ms
        setTimeout(()=>{
          if(G.scr!=="battle")return;
          sfxHit();
          if(ev.ip)hitAnim("sp2","sp2wrap","rip2",ev.col,ev.d,ev.isS);
          else hitAnim("sp1","sp1wrap","rip1",ev.col,ev.d,ev.isS);
          // Animate HP bar smoothly
          const atkHp=ev.ip?nt1[na1]:nt2[na2], defHp=ev.ip?nt2[na2]:nt1[na1];
          setTimeout(()=>{
            if(ev.ip)animHpBar("hpbar2",defHp.currentHp,defHp.hp,true);
            else animHpBar("hpbar1",defHp.currentHp,defHp.hp,false);
          },200);
          // Defender quote on hit — shown over defender's head
          const defId=ev.ip?b.t2[b.a2].id:b.t1[b.a1].id;
          const defIsP1=!ev.ip;
          if(ev.fainted){
            const fQ=qGet(defId,"faint");
            sfxFaint();
            if(fQ) setTimeout(()=>amsgPoke(defIsP1,`<span style="color:#FCA5A5;font-weight:900;font-size:1rem;font-style:italic;">"${fQ}"</span>`,2000),400);
            setTimeout(()=>amsg(`<span style="font-size:1rem;font-weight:900;color:#FCA5A5;">😔 ¡${ev.defNm} se ha debilitado!</span>`,2000),fQ?2500:400);
          } else {
            const hitQ=qGet(defId,"hit");
            if(hitQ&&Math.random()<0.33){setTimeout(()=>amsgPoke(defIsP1,`<span style="color:#FDA4AF;font-weight:900;font-size:1rem;font-style:italic;">"${hitQ}"</span>`,1800),300);}
          }
          if(ev.isS){sfxSuper();setTimeout(()=>amsg(`<span style="font-size:1.35rem;font-weight:900;color:#FCD34D;text-shadow:0 0 20px #F59E0B;">💥 ¡ES SÚPER EFECTIVO!</span>`,2000),ev.fainted?0:1200);}
          else if(ev.isW){sfxWeak();setTimeout(()=>amsg(`<span style="font-size:1rem;font-weight:800;color:#CBD5E1;">😕 No es muy efectivo...</span>`,2000),ev.fainted?0:1200);}
          else if(ev.isN){setTimeout(()=>amsg(`<span style="font-size:1rem;font-weight:800;color:#9CA3AF;">❌ ¡No tiene efecto!</span>`,2000),ev.fainted?0:1200);}
        },1800);
      }
    },delay);
    delay+=ev.type==="atk"?5500:(ev.type==="status_dmg"?2800:2400);
  });

  setTimeout(()=>{
    if(G.scr!=="battle")return;
    b.t1=nt1;b.t2=nt2;b.st=st;b.a1=na1;b.a2=na2;
    b.cd1=reduceCd(b.cd1);b.cd2=reduceCd(b.cd2);
    b.locked=false;
    const al1=nt1.every(p=>p.currentHp<=0),al2=nt2.every(p=>p.currentHp<=0);
    const ns1=nt1[na1].currentHp<=0&&!al1,ns2=nt2[na2].currentHp<=0&&!al2;
    if(al1){G.vd={winner:G.p2,loser:G.p1,stats:b.st,isP1Win:false};addRec(false,b.st.moves);sfxDefeat();setTimeout(()=>go("victory"),600);return;}
    if(al2){G.vd={winner:G.p1,loser:G.p2,stats:b.st,isP1Win:true};addRec(true,b.st.moves);sfxVic();setTimeout(()=>go("victory"),600);return;}
    if(ns1){G.fsfor="p1";go("fswitch");return;}
    if(ns2){if(G.p2.isCPU){const nx=nt2.findIndex((pk,i)=>pk.currentHp>0&&i!==na2);if(nx!==-1)b.a2=nx;}else{G.fsfor="p2";go("fswitch");return;}b.ph="action";render();return;}
    b.ph="action";
    if(G.mode==="pvp"){const nxt=b.ct==="p1"?"p2":"p1";b.ct=nxt;shPass(nxt==="p1"?G.p1:G.p2,()=>{b.ph="action";go("battle");});}
    else render();
  },delay+600);
}

// Global sprite position state for use by lunge animations
let SP={p1cx:0,p2cx:0,sprH:0,groundY:0,W:0};

// Called when each sprite image finishes loading
// This is the ONLY reliable way to position sprites at the ground
function animPokeball(isP1, onDone){
  const arena=document.getElementById("arena");
  if(!arena){onDone();return;}
  const pb=document.createElement("div");
  const x=isP1?SP.p1cx:(SP.p2cx||SP.W*0.8);
  pb.style.cssText=`position:absolute;left:${x}px;top:50%;transform:translate(-50%,-50%);z-index:50;animation:vsSlam .4s ease both;`;
  pb.innerHTML=POKEBALL_MINI;
  arena.appendChild(pb);
  // Flash
  const fl=document.createElement("div");
  fl.style.cssText=`position:absolute;inset:0;background:rgba(255,255,255,.6);z-index:49;animation:sfShock .35s ease forwards;pointer-events:none;`;
  arena.appendChild(fl);
  setTimeout(()=>{pb.remove();fl.remove();onDone();},420);
}
function placeSpriteNow(img, wrapId, shadowId, isP1, groundH){
  const arena=document.getElementById("arena");
  if(!arena)return;
  const W=arena.offsetWidth, H=arena.offsetHeight;
  if(!W||!H)return;

  const horizonY=Math.round(H*(100-groundH)/100);
  const fighterGroundY=Math.round(H*0.90);

  // Portrait mobile: smaller sprites, more padding to avoid overlap
  const isPortrait = W < H;
  const maxPct   = isPortrait ? 0.20 : 0.28;   // sprite width % of arena
  const minPx    = isPortrait ? 100  : 190;
  const maxPx    = isPortrait ? 200  : 380;
  const maxHpct  = isPortrait ? 0.38 : 0.46;   // max height % of arena
  const padPct   = isPortrait ? 0.03 : 0.08;   // side padding

  const targetW=Math.min(maxPx, Math.max(minPx, Math.round(W*maxPct)));

  img.style.width=targetW+"px";
  img.style.height="auto";
  img.style.display="block";

  const ratio=(img.naturalHeight&&img.naturalWidth)
    ? img.naturalHeight/img.naturalWidth : 1;
  let spriteH=Math.round(targetW*ratio);
  spriteH=Math.min(spriteH, Math.round(H*maxHpct));

  const wrap=document.getElementById(wrapId);
  if(!wrap)return;

  const sidePad=Math.round(W*padPct);
  wrap.style.cssText=[
    "position:absolute","z-index:3","background:transparent",
    "border:none","outline:none","box-shadow:none","overflow:visible",
    `width:${targetW}px`,`height:${spriteH}px`,
    `top:${fighterGroundY-spriteH}px`,"bottom:auto",
    isP1?`left:${sidePad}px`:`right:${sidePad}px`
  ].join(";")+";";

  if(isP1){wrap.style.right="auto";SP.p1cx=sidePad+targetW*0.5;}
  else{wrap.style.left="auto";SP.p2cx=W-sidePad-targetW*0.5;}

  SP.sprH=spriteH; SP.groundY=fighterGroundY; SP.horizonY=horizonY;
  SP.W=W; SP.sprTop=fighterGroundY-spriteH;

  // Shiny effect
  const pkData=isP1?G.bat.t1[G.bat.a1]:G.bat.t2[G.bat.a2];
  if(pkData&&pkData.shiny){
    img.style.filter="drop-shadow(0 0 8px #FFD700) saturate(0.5) sepia(1) hue-rotate(10deg) brightness(1.4)";
    // Spawn sparkles
    for(let si=0;si<6;si++){
      setTimeout(()=>{
        const sp=document.createElement("div");
        sp.textContent="✨";
        sp.style.cssText=`position:absolute;font-size:${14+Math.random()*10}px;left:${Math.random()*100}%;top:${Math.random()*80}%;z-index:30;pointer-events:none;animation:zzzFloat 1.2s ease-out forwards;`;
        wrap.appendChild(sp);setTimeout(()=>sp.remove(),1200);
      },si*200);
    }
    amsg('<span style="color:#FFD700;font-weight:900;font-size:1.1rem;">✨ ¡Pokémon SHINY!</span>',2500);
  }
  // Entry animation: slide in from edge + flash
  img.style.animation=isP1?"pkSlideInLeft .5s cubic-bezier(.175,.885,.32,1.275) forwards":"pkSlideInRight .5s cubic-bezier(.175,.885,.32,1.275) forwards";
  setTimeout(()=>{
    const idleAnim=isP1?"idleBreath 2.5s ease-in-out .5s infinite":"idleBreath2 2.5s ease-in-out .5s infinite";
    img.style.animation=`pkFlashIn .4s ease forwards, ${idleAnim}`;
    if(pkData&&pkData.shiny)img.style.filter="drop-shadow(0 0 6px #FFD700) saturate(0.6) sepia(0.8) hue-rotate(10deg) brightness(1.3)";
  },520);

  const sfx=document.getElementById("sfx-center");
  if(sfx){sfx.style.left=Math.round(W*0.5)+"px";sfx.style.top=Math.round(fighterGroundY-spriteH*0.55)+"px";}

  const sh=document.getElementById(shadowId);
  if(sh){
    const shW=Math.round(targetW*0.55);
    const shH=Math.max(10,Math.round(shW*0.14));
    const shX=isP1?(sidePad+targetW*0.5):(W-sidePad-targetW*0.5);
    sh.style.cssText=[
      "position:absolute",`left:${shX}px`,`top:${fighterGroundY-shH/2}px`,
      `width:${shW}px`,`height:${shH}px`,"transform:translateX(-50%)",
      "background:rgba(0,0,0,.42)","border-radius:50%","filter:blur(10px)",
      "pointer-events:none","z-index:2"
    ].join(";")+";";
  }
}


function onSpriteLoad(img, wrapId, shadowId, isP1, groundH){
  // Retry up to 5 times if arena not measured yet (mobile timing issue)
  let tries=0;
  function attempt(){
    const arena=document.getElementById("arena");
    if(!arena)return;
    if(arena.offsetHeight<10&&tries<5){tries++;requestAnimationFrame(attempt);return;}
    placeSpriteNow(img,wrapId,shadowId,isP1,groundH);
  }
  attempt();
}

function positionSprites(groundH){
  const arena=document.getElementById("arena");
  if(!arena)return;
  const W=arena.offsetWidth,H=arena.offsetHeight;
  if(!W||!H)return;

  // Width of sprite = 28% of arena width (SF proportions)
  const sprW=Math.min(260,Math.max(120,Math.round(W*0.28)));
  const p1cx=Math.round(W*0.18);
  const p2cx=Math.round(W*0.82);
  const groundY=Math.round(H*(100-groundH)/100);
  SP={p1cx,p2cx,sprH:sprW,groundY,sprTop:groundY-sprW,W};

  ["sp1wrap","sp2wrap"].forEach((id,i)=>{
    const el=document.getElementById(id);
    if(!el)return;
    const cx=i===0?p1cx:p2cx;
    el.style.cssText=`position:absolute;left:${cx}px;bottom:${groundH}%;top:auto;width:${sprW}px;height:auto;transform:translateX(-50%);background:transparent;border:none;outline:none;box-shadow:none;overflow:visible;z-index:3;`;
    const img=el.querySelector("img");
    if(img){
      // p1 (i===0) must face right → scaleX(-1)
      const mirror=i===0?"scaleX(-1)":"scaleX(1)";
      const filt=img.style.filter||"";
      img.style.cssText=`width:${sprW}px;height:auto;display:block;transform:${mirror};filter:${filt};`;
    }
  });

  const sfx=document.getElementById("sfx-center");
  if(sfx){sfx.style.cssText=`position:absolute;left:${Math.round(W*0.5)}px;top:${Math.round(groundY-sprW*0.6)}px;z-index:15;pointer-events:none;`;}

  const shW=Math.round(sprW*0.7),shH=Math.max(8,Math.round(sprW*0.07));
  ["sh1","sh2"].forEach((id,i)=>{
    const sh=document.getElementById(id);if(!sh)return;
    const cx=i===0?p1cx:p2cx;
    sh.style.cssText=`position:absolute;left:${cx}px;bottom:${groundH}%;top:auto;width:${shW}px;height:${shH}px;transform:translateX(-50%);background:rgba(0,0,0,.35);border-radius:50%;filter:blur(9px);pointer-events:none;z-index:2;`;
  });
}

showSplash();
</script>
</body>
